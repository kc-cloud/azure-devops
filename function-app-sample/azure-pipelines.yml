parameters:
  - name: environment
    displayName: 'Deployment Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - test
      - prod
  - name: branchName
    displayName: 'Branch to Deploy'
    type: string
    default: 'main'
    values:
      - main
      - develop

trigger: none

resources:
  repositories:
    - repository: functionAppCode
      type: git
      name: enrollment-app
      ref: refs/heads/${{ parameters.branchName }}

variables:
  # Function app name (same across all environments)
  functionAppName: 'azfn-test'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

  # Working Directory (enrollment-function-app folder within the repository)
  workingDirectory: '$(System.DefaultWorkingDirectory)/enrollment-function-app'

  # Python version
  pythonVersion: '3.11'

  # Environment-specific service connection
  ${{ if eq(parameters.environment, 'dev') }}:
    azureSubscription: 'azure-rm-connection-dev'
    environmentName: 'development'
  ${{ if eq(parameters.environment, 'test') }}:
    azureSubscription: 'azure-rm-connection-test'
    environmentName: 'testing'
  ${{ if eq(parameters.environment, 'prod') }}:
    azureSubscription: 'azure-rm-connection-prod'
    environmentName: 'production'

stages:
- stage: Build
  displayName: Build and Test
  jobs:
  - job: BuildAndTest
    displayName: Build and Test
    pool:
      vmImage: $(vmImageName)
    container: python:$(pythonVersion)-slim

    steps:
    - checkout: functionAppCode
      displayName: 'Checkout function app code'

    - bash: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
      workingDirectory: $(workingDirectory)
      displayName: 'Install dependencies'

    - bash: |
        python -m pytest tests/ -v --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml --cov=. --cov-report=html --cov-report=xml
      workingDirectory: $(workingDirectory)
      displayName: 'Run pytest tests'
      continueOnError: false

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Build.ArtifactStagingDirectory)/test-results.xml'
        failTaskOnFailedTests: true

    - task: PublishCodeCoverageResults@1
      displayName: 'Publish code coverage'
      condition: succeededOrFailed()
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'

    - bash: |
        pip install --target="./.python_packages/lib/site-packages" -r ./requirements.txt
      workingDirectory: $(workingDirectory)
      displayName: 'Install deployment dependencies'

    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(workingDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      artifact: drop
      displayName: 'Publish artifact'

- stage: Deploy
  displayName: 'Deploy to ${{ parameters.environment }}'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: 'Deploy to ${{ parameters.environment }}'
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      displayName: 'Use Python $(pythonVersion)'
      inputs:
        versionSpec: $(pythonVersion)

    - task: DownloadPipelineArtifact@2
      displayName: 'Download build artifact'
      inputs:
        artifact: drop
        path: $(Pipeline.Workspace)/drop

    - task: AzureFunctionApp@1
      displayName: 'Deploy Azure Function App to ${{ parameters.environment }}'
      inputs:
        azureSubscription: '$(azureSubscription)'
        appType: 'functionAppLinux'
        appName: '$(functionAppName)'
        package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
        deploymentMethod: 'auto'
