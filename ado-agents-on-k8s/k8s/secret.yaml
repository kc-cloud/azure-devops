# IMPORTANT: Before applying, base64-encode your values:
#   echo -n "https://dev.azure.com/YOUR_ORG" | base64
#   echo -n "YOUR_PAT_TOKEN"                 | base64
#
# Or use: kubectl create secret generic ado-agent-secret \
#   --namespace ado-agents \
#   --from-literal=AZP_URL="https://dev.azure.com/YOUR_ORG" \
#   --from-literal=AZP_TOKEN="YOUR_PAT_TOKEN"
#
# Required PAT scopes: Agent Pools (Read & Manage)

apiVersion: v1
kind: Secret
metadata:
  name: ado-agent-secret
  namespace: ado-agents
type: Opaque
data:
  AZP_URL: <BASE64_ENCODED_ORG_URL>
  AZP_TOKEN: <BASE64_ENCODED_PAT_TOKEN>
