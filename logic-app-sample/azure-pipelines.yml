parameters:
  - name: environment
    displayName: 'Deployment Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - test
      - prod

trigger:
  branches:
    include:
      - main
      - develop

resources:
  repositories:
    - repository: logicAppCode
      type: git
      name: enrollment-app
      ref: refs/heads/main

variables:
  # Logic App name (same across all environments)
  logicAppName: 'logic-enrollment-app'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

  # Working Directory (enrollment-logic-app folder within the repository)
  workingDirectory: '$(System.DefaultWorkingDirectory)/enrollment-logic-app'

  # Environment-specific service connection
  ${{ if eq(parameters.environment, 'dev') }}:
    azureSubscription: 'azure-rm-connection-dev'
    environmentName: 'development'
  ${{ if eq(parameters.environment, 'test') }}:
    azureSubscription: 'azure-rm-connection-test'
    environmentName: 'testing'
  ${{ if eq(parameters.environment, 'prod') }}:
    azureSubscription: 'azure-rm-connection-prod'
    environmentName: 'production'

stages:
- stage: Build
  displayName: Build and Package
  jobs:
  - job: BuildAndPackage
    displayName: Build and Package
    pool:
      vmImage: $(vmImageName)

    steps:
    - checkout: logicAppCode
      displayName: 'Checkout logic app code'

    - bash: |
        echo "Validating Logic App structure..."
        if [ ! -f "host.json" ]; then
          echo "Error: host.json not found!"
          exit 1
        fi
        if [ ! -f "connections.json" ]; then
          echo "Error: connections.json not found!"
          exit 1
        fi

        # Count workflows
        workflow_count=$(find . -maxdepth 2 -name "workflow.json" | wc -l)
        echo "Found $workflow_count workflow(s)"

        if [ $workflow_count -eq 0 ]; then
          echo "Warning: No workflows found!"
        fi

        # List all workflows
        echo "Workflows:"
        find . -maxdepth 2 -name "workflow.json" -exec dirname {} \; | sort
      workingDirectory: $(workingDirectory)
      displayName: 'Validate Logic App structure'

    - bash: |
        echo "Listing files to be packaged:"
        ls -R
      workingDirectory: $(workingDirectory)
      displayName: 'List package contents'

    - bash: |
        echo "Restructuring files for Logic App Standard deployment..."

        # Create temporary directory with correct structure
        TEMP_DIR="$(Build.ArtifactStagingDirectory)/logicapp-temp"
        mkdir -p "$TEMP_DIR/workflows"

        # Copy root files (host.json, connections.json, etc.)
        echo "Copying root files..."
        cp host.json "$TEMP_DIR/" 2>/dev/null || echo "host.json not found"
        cp connections.json "$TEMP_DIR/" 2>/dev/null || echo "connections.json not found"
        cp local.settings.json "$TEMP_DIR/" 2>/dev/null || true
        cp .logicappignore "$TEMP_DIR/" 2>/dev/null || true

        # Move workflow folders into workflows directory
        echo "Moving workflow folders into workflows directory..."
        for workflow_dir in 00*/; do
          # Check if directory contains workflow.json
          if [ -f "${workflow_dir}workflow.json" ]; then
            workflow_name=$(basename "$workflow_dir")
            echo "  Moving workflow: $workflow_name"
            cp -r "$workflow_dir" "$TEMP_DIR/workflows/"
          fi
        done

        echo ""
        echo "Final structure to be deployed:"
        ls -R "$TEMP_DIR"
      workingDirectory: $(workingDirectory)
      displayName: 'Restructure for Logic App deployment'

    - task: ArchiveFiles@2
      displayName: 'Archive Logic App files'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/logicapp-temp'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      artifact: logic-app
      displayName: 'Publish artifact'

- stage: Deploy
  displayName: 'Deploy to ${{ parameters.environment }}'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: 'Deploy to ${{ parameters.environment }}'
    environment: '$(environmentName)'
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: logic-app
            displayName: 'Download build artifact'

          # - task: AzureFunctionApp@1
          #   displayName: 'Deploy Logic App to ${{ parameters.environment }} (Primary Method)'
          #   continueOnError: true
          #   inputs:
          #     azureSubscription: '$(azureSubscription)'
          #     appType: 'functionApp'
          #     appName: '$(logicAppName)'
          #     package: '$(Pipeline.Workspace)/logic-app/$(Build.BuildId).zip'
          #     deploymentMethod: 'zipDeploy'

          - task: AzureCLI@2
            displayName: 'Deploy Logic App to ${{ parameters.environment }} (Fallback Method)'
            # condition: failed()
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "=========================================="
                echo "Deploying Logic App Standard using Azure CLI..."
                echo "=========================================="
                echo "Resource Group: $(azureSubscription)"
                echo "Logic App Name: $(logicAppName)"
                echo "Package: $(Pipeline.Workspace)/logic-app/$(Build.BuildId).zip"
                echo ""

                # Verify the package exists
                if [ ! -f "$(Pipeline.Workspace)/logic-app/$(Build.BuildId).zip" ]; then
                  echo "ERROR: Package file not found!"
                  exit 1
                fi

                echo "Package size: $(du -h $(Pipeline.Workspace)/logic-app/$(Build.BuildId).zip)"
                echo ""

                # Inspect the zip file contents
                echo "Inspecting zip file contents..."
                unzip -l "$(Pipeline.Workspace)/logic-app/$(Build.BuildId).zip" | head -30
                echo ""

                # Check if Logic App exists
                echo "Checking if Logic App exists..."
                az logicapp show \
                  --resource-group $(azureSubscription) \
                  --name $(logicAppName) \
                  --query "name" -o tsv

                echo ""
                echo "Checking Logic App state and configuration..."
                az logicapp show \
                  --resource-group $(azureSubscription) \
                  --name $(logicAppName) \
                  --query "{state:state, kind:kind, sku:sku.name}" -o json

                echo ""
                echo "Checking required application settings..."
                echo "AzureWebJobsStorage: $(az webapp config appsettings list --resource-group $(azureSubscription) --name $(logicAppName) --query "[?name=='AzureWebJobsStorage'].value" -o tsv | head -c 50)..."
                echo "FUNCTIONS_EXTENSION_VERSION: $(az webapp config appsettings list --resource-group $(azureSubscription) --name $(logicAppName) --query "[?name=='FUNCTIONS_EXTENSION_VERSION'].value" -o tsv)"
                echo "FUNCTIONS_WORKER_RUNTIME: $(az webapp config appsettings list --resource-group $(azureSubscription) --name $(logicAppName) --query "[?name=='FUNCTIONS_WORKER_RUNTIME'].value" -o tsv)"

                echo ""
                echo "Checking Azure CLI version..."
                az --version
                echo ""

                echo "Starting deployment..."

                # Check service principal permissions
                echo "Current account:"
                az account show --query "{subscription:name, user:user.name}" -o json

                echo ""
                echo "Attempting deployment with extended timeout..."

                # Try deployment with timeout and build-remote options
                az functionapp deployment source config-zip \
                  --resource-group $(azureSubscription) \
                  --name $(logicAppName) \
                  --src "$(Pipeline.Workspace)/logic-app/$(Build.BuildId).zip" \
                  --timeout 600 \
                  --build-remote false

                DEPLOY_RESULT=$?

                if [ $DEPLOY_RESULT -ne 0 ]; then
                  echo ""
                  echo "=========================================="
                  echo "Primary deployment failed. Trying alternative method..."
                  echo "=========================================="
                  echo ""

                  # Alternative: Use Kudu REST API directly
                  echo "Getting Kudu credentials..."
                  KUDU_USER=$(az webapp deployment list-publishing-credentials \
                    --resource-group $(azureSubscription) \
                    --name $(logicAppName) \
                    --query "publishingUserName" -o tsv)

                  KUDU_PASS=$(az webapp deployment list-publishing-credentials \
                    --resource-group $(azureSubscription) \
                    --name $(logicAppName) \
                    --query "publishingPassword" -o tsv)

                  echo "Deploying via Kudu ZipDeploy API..."
                  HTTP_STATUS=$(curl -X POST \
                    -u "$KUDU_USER:$KUDU_PASS" \
                    --data-binary @"$(Pipeline.Workspace)/logic-app/$(Build.BuildId).zip" \
                    -H "Content-Type: application/octet-stream" \
                    -w "%{http_code}" \
                    -o /tmp/deploy_response.txt \
                    "https://$(logicAppName).scm.azurewebsites.net/api/zipdeploy")

                  echo "HTTP Status: $HTTP_STATUS"
                  echo "Response:"
                  cat /tmp/deploy_response.txt
                  echo ""

                  if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
                    echo "Kudu deployment successful!"
                  else
                    echo "Kudu deployment failed with status $HTTP_STATUS"
                    exit 1
                  fi
                fi

                echo ""
                echo "=========================================="
                echo "Deployment command completed!"
                echo "=========================================="
                echo ""

                # Restart the Logic App to ensure files are loaded
                echo "Restarting Logic App to ensure deployment is loaded..."
                az webapp restart \
                  --resource-group $(azureSubscription) \
                  --name $(logicAppName)

                echo "Logic App restarted. Waiting 15 seconds for startup..."
                sleep 15

                echo ""
                echo "Verifying deployment via Kudu API..."

                # Get publishing credentials
                echo "Getting publishing credentials..."
                PUBLISH_PROFILE=$(az webapp deployment list-publishing-credentials \
                  --resource-group $(azureSubscription) \
                  --name $(logicAppName) \
                  --query "{username:publishingUserName, password:publishingPassword}" -o json 2>/dev/null)

                if [ $? -eq 0 ] && [ -n "$PUBLISH_PROFILE" ]; then
                  KUDU_USER=$(echo $PUBLISH_PROFILE | jq -r '.username')
                  KUDU_PASS=$(echo $PUBLISH_PROFILE | jq -r '.password')

                  echo "Checking wwwroot directory structure via Kudu..."
                  KUDU_RESPONSE=$(curl -s -u "$KUDU_USER:$KUDU_PASS" \
                    "https://$(logicAppName).scm.azurewebsites.net/api/vfs/site/wwwroot/")

                  if echo "$KUDU_RESPONSE" | jq -e . >/dev/null 2>&1; then
                    echo "Files in wwwroot:"
                    echo "$KUDU_RESPONSE" | jq -r '.[].name' 2>/dev/null || echo "$KUDU_RESPONSE"
                  else
                    echo "Kudu API response (not JSON):"
                    echo "$KUDU_RESPONSE" | head -20
                  fi

                  echo ""
                  echo "Checking for workflows directory..."
                  WORKFLOWS_RESPONSE=$(curl -s -u "$KUDU_USER:$KUDU_PASS" \
                    "https://$(logicAppName).scm.azurewebsites.net/api/vfs/site/wwwroot/workflows/")

                  if echo "$WORKFLOWS_RESPONSE" | jq -e . >/dev/null 2>&1; then
                    echo "Workflows found:"
                    echo "$WORKFLOWS_RESPONSE" | jq -r '.[].name' 2>/dev/null
                  else
                    echo "Workflows directory not accessible or doesn't exist"
                  fi
                else
                  echo "Could not get publishing credentials"
                fi

                echo ""
                echo "Verifying workflows via Azure REST API..."
                # Use az rest instead of az logicapp workflow (more compatible)
                SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                az rest --method get \
                  --url "https://management.azure.com/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$(azureSubscription)/providers/Microsoft.Web/sites/$(logicAppName)/workflows?api-version=2022-03-01" \
                  --query "value[].name" -o tsv 2>/dev/null || echo "Could not list workflows via API"

                echo ""
                echo "Deployment verification completed!"
